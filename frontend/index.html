<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Method Mayhem | CTF Challenge</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- truth changes when method changes -->

  <div class="container">
    <div class="card">
      <div class="badge">🕵️ CTF Challenge</div>
      <h1>Method Mayhem</h1>
      <p class="subtitle">Something is hidden here. Can you find it?</p>

      <button id="checkBtn" onclick="checkStatus()">
        <span class="btn-icon">🔍</span> Check Status
      </button>

      <div id="response-box" class="response-box hidden">
        <div class="response-label">Response</div>
        <pre id="response-output"></pre>
      </div>

      <div class="hint-block">
        <span class="hint-icon">💡</span>
        <span>Inspect the page source for hints.</span>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
