<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verify Yourself</title>
  <!-- FLAG{frontend_fake} -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d0d;
      font-family: 'Courier New', Courier, monospace;
      color: #e0e0e0;
    }

    .container {
      text-align: center;
      padding: 3rem 4rem;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      background: #111;
      box-shadow: 0 0 40px rgba(0, 255, 136, 0.05);
      max-width: 480px;
      width: 90%;
    }

    .lock-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 0.5rem;
      color: #ffffff;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    p.subtitle {
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 2rem;
      letter-spacing: 1px;
    }

    button#verifyBtn {
      background: #00ff88;
      color: #0d0d0d;
      border: none;
      padding: 0.85rem 2.5rem;
      font-size: 1rem;
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s, transform 0.1s;
    }

    button#verifyBtn:hover {
      background: #00cc6a;
    }

    button#verifyBtn:active {
      transform: scale(0.97);
    }

    #response {
      margin-top: 1.8rem;
      padding: 1rem;
      border-radius: 6px;
      font-size: 0.85rem;
      text-align: left;
      white-space: pre-wrap;
      word-break: break-all;
      display: none;
      border: 1px solid #2a2a2a;
      background: #0a0a0a;
      color: #aaa;
    }

    .tag {
      display: inline-block;
      margin-top: 2rem;
      font-size: 0.7rem;
      color: #333;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="lock-icon">🔒</div>
    <h1>Verification</h1>
    <p class="subtitle">Prove you are who you say you are.</p>

    <button id="verifyBtn" onclick="verify()">Verify Me</button>

    <div id="response"></div>

    <span class="tag">// system.auth.v1</span>
  </div>

  <script>
    // TODO: remove before prod — FLAG{not_this_one}
    // console.log("debug key: FLAG{try_harder_fake}");

    const BACKEND_URL = window.BACKEND_URL || 'http://localhost:3000';

    function verify() {
      const btn = document.getElementById('verifyBtn');
      const responseBox = document.getElementById('response');

      btn.textContent = 'Verifying...';
      btn.disabled = true;

      // This sends a GET request — participants need to intercept and change it
      fetch(`${BACKEND_URL}/verify?user=guest&auth=false`, {
        method: 'GET'
      })
        .then(res => res.json())
        .then(data => {
          responseBox.style.display = 'block';
          responseBox.textContent = JSON.stringify(data, null, 2);
          btn.textContent = 'Verify Me';
          btn.disabled = false;
        })
        .catch(err => {
          responseBox.style.display = 'block';
          responseBox.textContent = 'Error: Could not reach server.';
          btn.textContent = 'Verify Me';
          btn.disabled = false;
        });
    }
  </script>

</body>
</html>
